refresh:
  name: Refresh
  description: Force a Monarch Insights refresh.
run_alerts:
  name: Run alerts
  description: Re-evaluate the Monarch Insights alert engine and dispatch.
gap_scan:
  name: Gap scan
  description: Scan for missing data and produce information requests.
submit_cost_basis_lot:
  name: Submit cost basis lot
  description: Add a manual cost-basis lot to the supplement store.
  fields:
    account_id:
      name: Account ID
      required: true
      example: "ACT_123abc"
      selector:
        text:
    ticker:
      name: Ticker
      required: true
      example: "AAPL"
      selector:
        text:
    quantity:
      name: Quantity
      required: true
      selector:
        number:
          step: 0.0001
    cost_per_share:
      name: Cost per share
      required: true
      selector:
        number:
          step: 0.0001
    acquired_on:
      name: Acquired on
      required: true
      selector:
        date:
